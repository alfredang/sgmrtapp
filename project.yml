name: SGMRT
options:
  bundleIdPrefix: com.alfredang
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: GU9WTSTX9M
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
targets:
  SGMRT:
    type: application
    platform: iOS
    sources:
      - SGMRTApp
    configFiles:
      Debug: Config/Local.xcconfig
      Release: Config/Local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alfredang.sgmrt
        PRODUCT_NAME: SGMRT
        INFOPLIST_FILE: SGMRTApp/Info.plist
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        UIRequiredDeviceCapabilities: arm64
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: SGMRTApp/Info.plist
      properties:
        CFBundleDisplayName: SGMRT
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "SGMRT uses your location to find your nearest MRT station and highlight your next stop while you ride."
        UIRequiredDeviceCapabilities:
          - arm64
        UILaunchScreen: {}
        LTAAccountKey: "$(LTA_ACCOUNT_KEY)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
